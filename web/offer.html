<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>takenncs-vehicleselll</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="offer-container" id="offerContainer">
    <button class="btn-close" id="closeBtn">
        <i class="fas fa-times"></i>
    </button>

    <div class="offer-header">
        <i class="fas fa-car"></i>
        <h2>SÖIDUKI SOETAMINE</h2>
    </div>

    <div class="vehicle-info">
        <div class="info-row">
            <span class="info-label">Mudel:</span>
            <span class="info-value" id="model"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Numbrimärk:</span>
            <span class="info-value" id="plate"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Müüja:</span>
            <span class="info-value" id="seller"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Hind:</span>
            <span class="info-value price-value" id="price"></span>
        </div>
    </div>

    <div class="button-group">
        <button class="btn-offer btn-accept" id="acceptBtn">
            <i class="fas fa-check-circle"></i> JAH, OSTAN
        </button>
        <button class="btn-offer btn-decline" id="declineBtn">
            <i class="fas fa-times-circle"></i> EI, KEELDU
        </button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>
</body>
</html>
